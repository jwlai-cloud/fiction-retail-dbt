name: downstream-impact-guardian
# This repo consumes the PUBLISHED guardian action — one block, no other
# integration. See https://github.com/jwlai-cloud/downstream-impact-guardian
on:
  pull_request:
    types: [opened, synchronize]
    paths: ["dbt/**"]

jobs:
  guardian:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: jwlai-cloud/downstream-impact-guardian@master
        with:
          dbt-project-dir: dbt
          datahub-url: ${{ secrets.DATAHUB_GMS_URL }}
          datahub-token: ${{ secrets.DATAHUB_GMS_TOKEN }}
          # Narrative LLM — provider is a repo variable, not code:
          # gemini-* uses google-api-key natively; any openai/<model> id
          # uses openai-api-key (+ openai-base-url for Qwen/DashScope etc).
          # All empty => deterministic narrative (offline-safe default).
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          narrative-model: ${{ vars.GUARDIAN_NARRATIVE_MODEL }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          openai-base-url: ${{ vars.OPENAI_BASE_URL }}
          warehouse-project: ${{ vars.GCP_PROJECT }}
          warehouse-dataset: ${{ vars.BQ_DATASET }}
